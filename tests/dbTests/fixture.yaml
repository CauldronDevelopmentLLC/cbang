---
# DB-free fixture: every endpoint is a SQL query whose result is supplied by
# the linked-in libmariadb fake (see FakeMariaDB.*).  dbQuery selects the
# endpoint + canned result per scenario.
jmpapi: 1.2.0
info: {title: db test, version: 0.0.0}

endpoints:
  /dict/{id}:
    args: {id: {type: u32}}
    get: {sql: "CALL UserGet({args.id})", return: dict}

  /names:
    get: {sql: "CALL Names()", return: list}

  /list:
    get: {sql: "CALL UserList()", return: list}

  /one:
    get: {sql: "SELECT COUNT(*) FROM users", return: one}

  /u64:
    get: {sql: "SELECT id FROM users LIMIT 1", return: u64}

  /flag:
    get: {sql: "SELECT active FROM users LIMIT 1", return: bool}

  /full/{id}:
    args: {id: {type: u32}}
    get: {fields: ["*", teams], sql: "CALL UserFull({args.id})"}

  /grid:
    get: {sql: "CALL Grid()", return: hlist}

  /err:
    get: {sql: "CALL Boom()", return: dict}

  # Binary parameter binding: a binary ref becomes a bound ? placeholder
  /blob:
    put: {sql: "CALL StoreBlob({body}, {body.type})", return: ok}

  /photo:
    post:
      sql: "CALL StorePhoto({files.photo}, {files.photo.filename})"
      return: ok

  # A ref inside a SQL string literal: the ? is not a placeholder, so the
  # bound parameter count does not match
  /blob-embed:
    put: {sql: "SELECT 'x-{body}'", return: ok}

  # A missing optional {~ref} binds NULL; a missing plain {ref} is an error
  /opt:
    post:
      args: {a: {optional: true}}
      sql: "CALL OptSave({~args.a})"
      return: ok

  /strict:
    get: {sql: "CALL Nope({args.nope})", return: ok}

  # Pipeline: pass discards, into captures, reply shapes
  /pipe/{id}:
    args: {id: {type: u32}}
    get:
      - sql: "CALL LogAccess({args.id})"
        return: pass
      - sql: "CALL UserGet({args.id})"
        return: dict
        into: user
      - reply: {user: '{user}', name: '{user.name}'}

  # Captured binary: re-bound into SQL and served via reply
  /blob-pipe:
    get:
      - sql: "CALL GetImage()"
        return: binary
        into: img
      - sql: "CALL StoreCopy({img})"
        return: pass
      - reply: '{img}'

  # Acceptance: upload -> store -> fetch -> exec transform -> store -> reply
  /resize/{id}/{size}:
    args: {id: {type: u32}, size: {type: u32}}
    put:
      body: {required: true}
      steps:
        - sql: "CALL ImageSet({args.id}, {body})"
          return: pass
        - sql: "CALL ImageGet({args.id})"
          return: binary
          into: original
        - exec:
            cmd: '{options.scripts}/transform.py'
            input: {src: '{original}', size: '{args.size}'}
        - sql: "CALL ImageSetSize({args.id}, {args.size}, {files.out})"
          return: pass
        - reply: '{files.out}'

  # Multipart upload + exec renditions merged into the existing {files.*}
  # root + optional ~refs bound as blobs (the production asset shape)
  /asset:
    post:
      args: {id: {}}
      files: {file: {required: true, max-size: 16MB}}
      steps:
        - exec:
            cmd:   '{options.scripts}/renditions.py'
            input: {src: '{files.file}', type: '{files.file.type}',
                    filename: '{files.file.filename}'}
        - sql: >
            CALL AssetSave({args.id}, {files.file.filename},
              {files.file.type}, {files.file},
              {~files.web}, {~files.web.type},
              {~files.thumb}, {~files.thumb.type})
          return: one

  # Binary response: column 1 of row 1 is the raw body; the Content-Type
  # comes from the content-type key, else a second column, else octet-stream
  /image:
    get: {sql: "CALL GetImage()", return: binary}

  /image-gif:
    get: {sql: "CALL GetImage()", return: binary, content-type: image/gif}

  # A single scalar whose column type is set per scenario.  Exercises numeric
  # rendering: FLOAT/DOUBLE regressed to 0, while DECIMAL and long strings did
  # not, so the type drives whether the bug reproduces.
  /scalar:
    get: {sql: "SELECT val FROM t LIMIT 1", return: one}

  # A work-unit-shaped row of mixed types, mirroring the real ProjectWUList
  # response that first surfaced the FLOAT-returns-0 bug.
  /wu:
    get: {sql: "CALL WU()", return: dict}
