---
# DB-free fixture exercising the synchronous handler chain offline.
jmpapi: 1.2.0
info: {title: api test, version: 0.0.0}

endpoints:
  /favicon.ico:
    get: {path: '{options.favicon}'}

  /redir:
    get: {handler: redirect, location: /target, code: 301}

  /down:
    get: {handler: status, code: 503, text: Maintenance}

  /openapi-spec:
    get: {handler: spec}

  /cors-test:
    any:
      handler: cors
      origins: ['https://example.com']
      methods: [GET, OPTIONS]

  /echo/{name}:
    args: {name: {type: string}}
    get:
      exec: '{options.scripts}/echo.py'

  /calc/{n}:
    args: {n: {type: u32}}
    get:
      exec:
        cmd: '{options.scripts}/echo.py'
        input: {n: '{args.n}', label: 'x-{args.n}'}

  # Conditions ------------------------------------------------------------

  # Typed numeric compare: lone '{args.n}' resolves to a number
  /cmp/{n}:
    args: {n: {type: u32}}
    get:
      if:   {'<': ['{args.n}', 100]}
      then: {handler: status, code: 200, text: small}
      else: {handler: status, code: 200, text: big}

  # File existence with interpolated path
  /exists/{name}:
    args: {name: {type: string}}
    get:
      if:   {exists: '{options.http-root}/{args.name}'}
      then: {handler: status, code: 200, text: found}
      else: {handler: status, code: 404, text: missing}

  # Nested boolean logic: and / not
  /bool/{n}:
    args: {n: {type: u32}}
    get:
      if:
        and:
          - {'<':  ['{args.n}', 100]}
          - {not: {'=': ['{args.n}', 0]}}
      then: {handler: status, code: 200, text: 'yes'}
      else: {handler: status, code: 200, text: 'no'}

  # Async cmd condition judged by exit status (resumes on the event loop)
  /cmd/{n}:
    args: {n: {type: u32}}
    get:
      if:   {cmd: 'test {args.n} -lt 100'}
      then: {handler: status, code: 200, text: lt}
      else: {handler: status, code: 200, text: ge}

  # Sequence body: a non-replying exec passes to the next statement
  /seq/{n}:
    args: {n: {type: u32}}
    get:
      if:   {'=': ['{args.n}', 0]}
      then: {handler: status, code: 200, text: zero}
      else:
        - exec: {cmd: '{options.scripts}/pass.py'}
        - {handler: status, code: 200, text: chained}

  # Binary side channel -----------------------------------------------------

  # Raw body metadata resolves; the echo envelope surfaces the values.
  # The body declaration validates size and type first.
  /body-info:
    put:
      body: {required: true, max-size: 10, type: text/*}
      exec:
        cmd: '{options.scripts}/echo.py'
        input: {size: '{body.size}', type: '{body.type}'}

  # Bytes embedded in a string context is an error
  /body-bad:
    put:
      exec:
        cmd: '{options.scripts}/echo.py'
        input: {bad: 'x-{body}'}

  # Typed numeric compare against body metadata
  /body-if:
    put:
      if:   {'=': ['{body.size}', 5]}
      then: {handler: status, code: 200, text: five}
      else: {handler: status, code: 200, text: other}

  # Multipart: plain fields fold into args, file parts under {files.*}
  /upload:
    args: {caption: {type: string}}
    post:
      files:
        photo: {required: true, max-size: 1K, type: [image/png, image/jpeg]}
      exec:
        cmd: '{options.scripts}/echo.py'
        input:
          caption:  '{args.caption}'
          filename: '{files.photo.filename}'
          type:     '{files.photo.type}'
          size:     '{files.photo.size}'

  # Explicit steps: the method dict keeps its keys beside the pipeline
  /steps/{n}:
    get:
      args: {n: {type: u32}}
      help: Steps test.
      steps:
        - if:   {'=': ['{args.n}', 0]}
          then: {handler: status, code: 200, text: zero}
        - {handler: status, code: 200, text: nonzero}

  # Exec file round-trip: body -> temp file -> transformed file -> reply
  /upcase:
    put:
      body: {required: true, max-size: 1K}
      steps:
        - exec:
            cmd: '{options.scripts}/upcase.py'
            input: {src: '{body}'}
        - reply: '{files.out}'

  # reply: shapes a response from resolved values
  /reply/{n}:
    get:
      args: {n: {type: u32}}
      reply: {n: '{args.n}', label: 'x-{args.n}'}

  /reply-code:
    get: {reply: created, code: 201}

  /.*:
    get:
      path: '{options.http-root}'
      index: index.html
